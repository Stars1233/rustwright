# Shared Rustwright files mirrored from rustwright to rustwright-cloud.
# Repository-specific GitHub workflows and metadata are intentionally excluded,
# with one deliberate exception: the form-fill cloud benchmark workflow is part
# of the shared benchmark suite and is mirrored so hardening fixes stay in
# lockstep. Note: syncing it requires RUSTWRIGHT_SYNC_GH_PAT to carry the
# `workflow` scope; while the two copies are identical the entry is inert.
# Cloud-only additions must live outside the mirrored paths below.
Skyvern-AI/rustwright-cloud:
  - source: .github/workflows/form-fill-cloud-benchmark.yml
    dest: .github/workflows/form-fill-cloud-benchmark.yml
  - source: benchmarks/
    dest: benchmarks/
    deleteOrphaned: true
  # The native agent CLI (cli/) and the native MCP server (mcp-rs/) are
  # standalone Cargo workspaces developed in both repos; they are mapped here
  # so external contributions back-sync to the cloud repo like the rest of the
  # shared tree. Both directories must exist on this repo's main before these
  # entries (deleteOrphaned would otherwise propagate their absence).
  - source: cli/
    dest: cli/
    deleteOrphaned: true
  - source: mcp-rs/
    dest: mcp-rs/
    deleteOrphaned: true
  # capi/ and rust-native/ are Cargo workspace members referenced by the synced
  # root Cargo.toml; they must mirror together or the target repo's workspace
  # breaks (as happened when Cargo.toml gained these members before the dirs
  # were mapped here).
  - source: capi/
    dest: capi/
    deleteOrphaned: true
  - source: rust-native/
    dest: rust-native/
    deleteOrphaned: true
  # Cross-language binding packages and their shared contract; mapped so
  # external contributions to any binding back-sync to the cloud repo. Every
  # directory exists on this repo's main (a deleteOrphaned prerequisite).
  - source: bindings/
    dest: bindings/
    deleteOrphaned: true
  - source: go/
    dest: go/
    deleteOrphaned: true
  - source: java/
    dest: java/
    deleteOrphaned: true
  - source: csharp/
    dest: csharp/
    deleteOrphaned: true
  - source: ruby/
    dest: ruby/
    deleteOrphaned: true
  - source: php/
    dest: php/
    deleteOrphaned: true
  - source: docs/
    dest: docs/
    deleteOrphaned: true
  - source: node/
    dest: node/
    deleteOrphaned: true
  - source: python/
    dest: python/
    deleteOrphaned: true
  - source: src/
    dest: src/
    deleteOrphaned: true
  - source: tests/
    dest: tests/
    deleteOrphaned: true
  - source: tools/
    dest: tools/
    deleteOrphaned: true
  - source: .dockerignore
    dest: .dockerignore
  - source: .gitignore
    dest: .gitignore
  - source: BENCHMARK.md
    dest: BENCHMARK.md
  - source: CODE_ARCHITECTURE.md
    dest: CODE_ARCHITECTURE.md
  - source: CODE_OF_CONDUCT.md
    dest: CODE_OF_CONDUCT.md
  - source: CONTRIBUTING.md
    dest: CONTRIBUTING.md
  - source: Cargo.lock
    dest: Cargo.lock
  - source: Cargo.toml
    dest: Cargo.toml
  - source: Dockerfile
    dest: Dockerfile
  - source: LICENSE
    dest: LICENSE
  - source: LIMITATIONS.md
    dest: LIMITATIONS.md
  - source: README.md
    dest: README.md
  - source: SECURITY.md
    dest: SECURITY.md
  - source: pyproject.toml
    dest: pyproject.toml
  - source: examples/
    dest: examples/
    deleteOrphaned: true
  - source: AGENTS.md
    dest: AGENTS.md
  - source: QUICKSTART.md
    dest: QUICKSTART.md
  - source: MEMORY_BENCH.md
    dest: MEMORY_BENCH.md
