<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Controlled form controls fixture</title>
</head>
<body>
  <main>
    <h1>Controlled form controls fixture</h1>
    <form id="controls-form">
      <fieldset>
        <legend>Text inputs</legend>
        <label for="t0">Text 0</label><input id="t0" name="t0" type="text">
        <label for="t1">Text 1</label><input id="t1" name="t1" type="text">
        <label for="t2">Text 2</label><input id="t2" name="t2" type="text">
        <label for="t3">Text 3</label><input id="t3" name="t3" type="text">
        <label for="t4">Text 4</label><input id="t4" name="t4" type="text">
        <label for="t5">Text 5</label><input id="t5" name="t5" type="text">
        <label for="t6">Text 6</label><input id="t6" name="t6" type="text">
        <label for="t7">Text 7</label><input id="t7" name="t7" type="text">
        <label for="t8">Text 8</label><input id="t8" name="t8" type="text">
        <label for="t9">Text 9</label><input id="t9" name="t9" type="text">
      </fieldset>

      <fieldset>
        <legend>Checkboxes</legend>
        <label><input id="c0" name="c0" type="checkbox"> Checkbox 0</label>
        <label><input id="c1" name="c1" type="checkbox"> Checkbox 1</label>
        <label><input id="c2" name="c2" type="checkbox"> Checkbox 2</label>
        <label><input id="c3" name="c3" type="checkbox"> Checkbox 3</label>
        <label><input id="c4" name="c4" type="checkbox"> Checkbox 4</label>
        <label><input id="c5" name="c5" type="checkbox"> Checkbox 5</label>
        <label><input id="c6" name="c6" type="checkbox"> Checkbox 6</label>
        <label><input id="c7" name="c7" type="checkbox"> Checkbox 7</label>
        <label><input id="c8" name="c8" type="checkbox"> Checkbox 8</label>
        <label><input id="c9" name="c9" type="checkbox"> Checkbox 9</label>
      </fieldset>

      <fieldset>
        <legend>Selects</legend>
        <label for="s0">Select 0</label>
        <select id="s0" name="s0">
          <option value="o0">Option 0</option>
          <option value="o1">Option 1</option>
          <option value="o2">Option 2</option>
          <option value="o3">Option 3</option>
          <option value="o4">Option 4</option>
        </select>
        <label for="s1">Select 1</label>
        <select id="s1" name="s1">
          <option value="o0">Option 0</option>
          <option value="o1">Option 1</option>
          <option value="o2">Option 2</option>
          <option value="o3">Option 3</option>
          <option value="o4">Option 4</option>
        </select>
        <label for="s2">Select 2</label>
        <select id="s2" name="s2">
          <option value="o0">Option 0</option>
          <option value="o1">Option 1</option>
          <option value="o2">Option 2</option>
          <option value="o3">Option 3</option>
          <option value="o4">Option 4</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Radios</legend>
        <label><input id="r0" name="radio-choice" type="radio" value="r0"> Radio 0</label>
        <label><input id="r1" name="radio-choice" type="radio" value="r1"> Radio 1</label>
        <label><input id="r2" name="radio-choice" type="radio" value="r2"> Radio 2</label>
        <label><input id="r3" name="radio-choice" type="radio" value="r3"> Radio 3</label>
        <label><input id="r4" name="radio-choice" type="radio" value="r4"> Radio 4</label>
      </fieldset>

      <button id="action" type="button">Action</button>
      <div id="results" aria-live="polite">Ready</div>
    </form>
  </main>
</body>
</html>
